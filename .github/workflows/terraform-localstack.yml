name: Terraform LocalStack CI

on:
  pull_request:
    paths:
      - "app/**"
      - "infra/**"
      - ".github/workflows/terraform-localstack.yml"

  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "infra/**"
      - ".github/workflows/terraform-localstack.yml"

permissions:
  contents: read

jobs:
  terraform-localstack:
    name: Validate Terraform with LocalStack
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-central-1

    services:
      localstack:
        image: localstack/localstack:4.4.0
        ports:
          - 4566:4566
          - 4510-4559:4510-4559
        env:
          SERVICES: s3,dynamodb,lambda,iam,logs,sts
          AWS_DEFAULT_REGION: eu-central-1
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock

    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Wait for LocalStack
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4566/_localstack/health > /dev/null; then
              echo "LocalStack is ready."
              exit 0
            fi

            echo "Waiting for LocalStack..."
            sleep 2
          done

          echo "LocalStack did not become ready in time."
          exit 1

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Install awslocal
        working-directory: .
        run: pip install awscli-local

      - name: Invoke Lambda
        run: |
          lambda_name="$(terraform output -raw lambda_name)"

          awslocal lambda wait function-active-v2 \
            --function-name "$lambda_name"

          awslocal lambda invoke \
            --function-name "$lambda_name" \
            --payload '{"source":"github-actions","message":"hello from CI"}' \
            response.json

          cat response.json

      - name: Verify S3 object was created
        run: |
          bucket_name="$(terraform output -raw bucket_name)"
          awslocal s3 ls "s3://$bucket_name/events/"

      - name: Verify DynamoDB item was created
        run: |
          table_name="$(terraform output -raw table_name)"
          awslocal dynamodb scan --table-name "$table_name"

      - name: Terraform destroy
        if: always()
        run: terraform destroy -auto-approve
